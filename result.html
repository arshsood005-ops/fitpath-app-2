<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitPath - Your Plan</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="result-page">
  <div class="container result-container">

    <div class="result-header">
      <div class="logo logo-sm">
        <div class="logo-icon-sm">F</div>
        <span>FitPath</span>
      </div>
    </div>

    <div id="plan-content">
      <div class="result-hero">
        <p class="hero-badge">Your Plan is Ready</p>
        <h1 class="hero-title">Your Personalized Fitness Plan</h1>
        <p class="hero-subtitle" id="greeting"></p>
      </div>

      <div class="summary-card">
        <div class="summary-grid">
          <div class="summary-item">
            <span class="summary-label">Name</span>
            <span class="summary-value" id="sum-name"></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Age</span>
            <span class="summary-value" id="sum-age"></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Weight</span>
            <span class="summary-value" id="sum-weight"></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Height</span>
            <span class="summary-value" id="sum-height"></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Goal</span>
            <span class="summary-value highlight" id="sum-goal"></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Level</span>
            <span class="summary-value" id="sum-activity"></span>
          </div>
        </div>
      </div>

      <div class="card card-diet">
        <div class="card-header">
          <div class="card-icon diet-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
          </div>
          <h2>Diet Plan</h2>
        </div>
        <div id="diet-plan"></div>
      </div>

      <div class="card card-workout">
        <div class="card-header">
          <div class="card-icon workout-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M12 6.5v11"/><circle cx="6.5" cy="12" r="3.5"/><circle cx="17.5" cy="12" r="3.5"/></svg>
          </div>
          <h2>Workout Plan</h2>
        </div>
        <div id="workout-plan"></div>
      </div>

      <div class="actions">
        <button id="download-btn" class="btn-primary">Download PDF</button>
      </div>

      <p class="footer-note">Generated by FitPath &middot; Stay consistent, see results</p>
    </div>

    <div id="error-content" class="error-state" style="display:none;">
      <div class="error-card">
        <div class="error-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <h2 class="error-title">No user data found</h2>
        <p class="error-message">Please access this page after completing your purchase.</p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>

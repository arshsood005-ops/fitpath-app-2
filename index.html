<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitPath - Your Fitness Plan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">F</div>
      <h1>FitPath</h1>
    </div>
    <p class="subtitle">Get your personalized fitness plan in seconds</p>

    <form id="fitness-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="age">Age</label>
          <input type="number" id="age" name="age" placeholder="e.g. 25" min="1" max="120" required>
        </div>
        <div class="form-group">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" name="weight" placeholder="e.g. 70" min="1" max="500" step="0.1" required>
        </div>
      </div>

      <div class="form-group">
        <label for="height">Height (cm)</label>
        <input type="number" id="height" name="height" placeholder="e.g. 175" min="1" max="300" step="0.1" required>
      </div>

      <div class="form-group">
        <label for="goal">Goal</label>
        <select id="goal" name="goal" required>
          <option value="" disabled selected>Select your goal</option>
          <option value="Fat Loss">Fat Loss</option>
          <option value="Muscle Gain">Muscle Gain</option>
        </select>
      </div>

      <div class="form-group">
        <label for="activity">Activity Level</label>
        <select id="activity" name="activity" required>
          <option value="" disabled selected>Select your level</option>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>
      </div>

      <button type="submit">Generate My Plan</button>
    </form>

    <p class="footer-note">Free &middot; No sign-up &middot; Instant results</p>
  </div>

  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-card">
      <div class="spinner"></div>
      <p class="loading-title">Creating your personalized plan...</p>
      <p class="loading-sub">Analyzing your inputs</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
